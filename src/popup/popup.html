<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Generals Helper</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        width: 220px;
        padding: 10px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 13px;
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .section {
        margin-top: 10px;
        font-size: 12px;
      }
      .section-title {
        margin: 0 0 6px;
        font-weight: 700;
      }
      .checks {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .checks label {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      button {
        border: 1px solid #bbb;
        background: #f5f5f5;
        padding: 5px 8px;
        cursor: pointer;
        text-align: left;
      }
      button[data-active="true"] {
        border-color: #3b82f6;
        background: #eaf2ff;
      }
      #status {
        margin-top: 10px;
        font-size: 12px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <h1>Generals Helper</h1>
    <div class="actions">
      <button id="modeRaw">模式：原始消息</button>
      <button id="modeBattle">模式：战场信息分析</button>
      <button id="toggleVisible">关闭面板</button>
    </div>
    <div class="section">
      <div class="section-title">面板行为</div>
      <div class="checks">
        <label><input id="autoRefresh" type="checkbox" checked /> 是否自动更新</label>
      </div>
    </div>
    <div class="section">
      <div class="section-title">战场信息显示</div>
      <div class="checks">
        <label><input id="showTurn" type="checkbox" checked /> 回合</label>
        <label><input id="showPlayers" type="checkbox" /> 存活人数</label>
        <label><input id="showMapDiff" type="checkbox" /> 地图变化</label>
        <label><input id="showCitiesDiff" type="checkbox" /> 城市变化</label>
        <label><input id="showDesertsDiff" type="checkbox" /> 沙漠变化</label>
        <label><input id="showDebug" type="checkbox" /> 调试信息</label>
      </div>
    </div>
    <div id="status">正在连接页面...</div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
