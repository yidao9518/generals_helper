<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Generals Helper</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        width: 220px;
        padding: 10px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 13px;
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .hint {
        margin-top: 10px;
        font-size: 12px;
        color: #666;
      }
      button {
        border: 1px solid #bbb;
        background: #f5f5f5;
        padding: 5px 8px;
        cursor: pointer;
        text-align: left;
      }
      button.secondary {
        background: #fff;
      }
      button[data-active="true"] {
        border-color: #3b82f6;
        background: #eaf2ff;
      }
      #status {
        margin-top: 10px;
        font-size: 12px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <h1>Generals Helper</h1>
    <div class="actions">
      <button id="modeRaw">模式：原始消息</button>
      <button id="modeBattle">模式：战场信息分析</button>
      <button id="toggleVisible">关闭面板</button>
      <button id="openDisplay" class="secondary">打开信息显示</button>
      <button id="openSettings" class="secondary">打开设置页面</button>
    </div>
    <div class="hint">更详细的设置与未来的信息显示内容，请到独立设置页查看。</div>
    <div id="status">正在连接页面...</div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
